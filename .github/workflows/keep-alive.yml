name: Keep Alive Bot

on:
  schedule:
    # Runs every 14 minutes (Render free tier sleeps after 15 mins)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Alumned In
        run: |
          curl -s https://alumedin.onrender.com/api/health > /dev/null
          echo "Bot successfully pinged Alumned In at $(date)"
